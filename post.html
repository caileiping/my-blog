<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 | 我的随笔</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">我的随笔</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="tags.html">标签</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <!-- 文章详情 -->
    <main class="post-detail-container">
        <article class="post-detail">
            <header class="post-header">
                <div class="post-meta">
                    <span class="post-date" id="postDate"></span>
                    <span class="post-tags" id="postTags"></span>
                </div>
                <h1 id="postTitle"></h1>
            </header>
            
            <div class="post-content" id="postContent">
                <!-- 文章内容将通过 JS 加载 -->
            </div>
        </article>

        <!-- 评论区 -->
        <section class="comments-section">
            <h3>评论</h3>
            
            <!-- 评论列表 -->
            <div id="commentsList" class="comments-list">
                <!-- 评论将通过 JS 加载 -->
            </div>

            <!-- 评论表单 -->
            <div class="comment-form">
                <h4>发表评论</h4>
                <form id="commentForm">
                    <div class="form-row">
                        <input type="text" id="commentName" placeholder="你的昵称" required>
                        <input type="email" id="commentEmail" placeholder="邮箱（不会公开）" required>
                    </div>
                    <textarea id="commentContent" rows="4" placeholder="写下你的想法..." required></textarea>
                    <button type="submit" class="btn-primary">发表评论</button>
                </form>
            </div>
        </section>

        <!-- 上一篇/下一篇 -->
        <nav class="post-nav">
            <a href="#" id="prevPost" class="post-nav-link prev">
                <span class="nav-label">← 上一篇</span>
                <span class="nav-title"></span>
            </a>
            <a href="#" id="nextPost" class="post-nav-link next">
                <span class="nav-label">下一篇 →</span>
                <span class="nav-title"></span>
            </a>
        </nav>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 我的随笔. 用心记录，认真生活。</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/post.js"></script>
</body>
</html>
