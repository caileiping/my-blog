<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的随笔 | 记录生活与思考</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">我的随笔</a>
            <div class="nav-links">
                <a href="index.html" class="active">首页</a>
                <a href="tags.html">标签</a>
                <a href="about.html">关于</a>
            </div>
            <div class="nav-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索文章...">
                    <button id="searchBtn">🔍</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 头部区域 -->
    <header class="hero">
        <div class="hero-content">
            <h1>记录生活的点滴</h1>
            <p class="subtitle">在这里，我分享日常所思所想，记录每一个值得铭记的瞬间</p>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-container">
        <!-- 标签筛选 -->
        <section class="tag-filter">
            <span class="filter-label">筛选：</span>
            <div class="tag-list" id="tagList">
                <button class="tag active" data-tag="all">全部</button>
            </div>
        </section>

        <!-- 文章列表 -->
        <section class="posts-section">
            <div id="postsContainer" class="posts-grid">
                <!-- 文章将通过 JS 动态加载 -->
            </div>
        </section>

        <!-- 加载更多 -->
        <div class="load-more">
            <button id="loadMoreBtn" class="btn-outline">加载更多</button>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 我的随笔. 用心记录，认真生活。</p>
            <div class="social-links">
                <a href="#" title="GitHub">GitHub</a>
                <a href="#" title="RSS">RSS</a>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
