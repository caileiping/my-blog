<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签 | 我的随笔</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">我的随笔</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="tags.html" class="active">标签</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <!-- 标签云 -->
    <main class="tags-container">
        <h1 class="page-title">标签云</h1>
        <p class="page-desc">按标签浏览文章</p>
        
        <div id="tagsCloud" class="tags-cloud">
            <!-- 标签将通过 JS 动态生成 -->
        </div>

        <!-- 选中标签的文章列表 -->
        <section id="tagPosts" class="tag-posts" style="display: none;">
            <h2 id="selectedTagName"></h2>
            <div id="tagPostsList" class="posts-grid"></div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 我的随笔. 用心记录，认真生活。</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/tags.js"></script>
</body>
</html>
